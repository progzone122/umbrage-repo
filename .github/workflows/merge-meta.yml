name: Merge meta

on:
  push:
    branches: [main]
    paths:
      - "meta/**/*.meta.yml"
      - ".github/scripts/merge_meta.py"
      - ".github/workflows/merge-meta.yml"
  pull_request:
    branches: [main]
    paths:
      - "meta/**/*.meta.yml"
      - ".github/scripts/merge_meta.py"
      - ".github/workflows/merge-meta.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate & merge meta YAML → meta.json
        run: python .github/scripts/merge_meta.py --verify --output meta.json

      - name: Upload meta.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: meta.json
          path: meta.json

      - name: Commit updated meta.json
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate meta.json"
            git push
          fi
